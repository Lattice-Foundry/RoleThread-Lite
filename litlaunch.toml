stable_polls = 2

[profiles.rolethread-browser]
app_path = "app.py"
cwd = "."
title = "RoleThread Lite"
mode = "browser"
browser = "auto"
host = "127.0.0.1"
port = 8501
auto_port = false
allow_browser_fallback = true
